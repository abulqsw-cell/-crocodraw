<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Рисовалка для Крокодила</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { text-align: center; font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
    canvas { border: 2px solid #333; background: #fff; cursor: crosshair; touch-action: none; border-radius: 10px; }
    .controls { margin-top: 15px; }
    button { padding: 10px 20px; font-size: 16px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; color: white; }
    .btn-clear { background-color: #f44336; }
    .btn-send { background-color: #4CAF50; }
  </style>
</head>
<body>

  <h2>🎨 Рисуй слово</h2>
  <canvas id="canvas" width="300" height="400"></canvas>

  <div class="controls">
    <button class="btn-clear" onclick="clearCanvas()">Очистить</button>
    <button class="btn-send" onclick="sendDrawing()">Отправить</button>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <script>
    const tg = window.Telegram.WebApp;
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let drawing = false;

    // Настройки кисти
    ctx.strokeStyle = "black";
    ctx.lineWidth = 4;
    ctx.lineCap = "round";

    // Функция получения координат
    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return [clientX - rect.left, clientY - rect.top];
    }

    function startDrawing(e) {
      drawing = true;
      const [x, y] = getPos(e);
      ctx.beginPath();
      ctx.moveTo(x, y);
    }

    function doDrawing(e) {
      if (!drawing) return;
      const [x, y] = getPos(e);
      ctx.lineTo(x, y);
      ctx.stroke();
    }

    function stopDrawing() {
      drawing = false;
    }

    // Слушатели для мышки
    canvas.addEventListener("mousedown", startDrawing);
    canvas.addEventListener("mousemove", doDrawing);
    window.addEventListener("mouseup", stopDrawing);

    // Слушатели для сенсора (телефона)
    canvas.addEventListener("touchstart", (e) => { startDrawing(e); e.preventDefault(); });
    canvas.addEventListener("touchmove", (e) => { doDrawing(e); e.preventDefault(); });
    canvas.addEventListener("touchend", stopDrawing);

    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // 2. ОТПРАВКА ДАННЫХ В БОТА
    function sendDrawing() {
      const dataURL = canvas.toDataURL("image/png");

      if (tg.sendData) {
        tg.sendData(dataURL); // Эта команда отправляет картинку в бота
        tg.close();           // Закрывает Web App
      } else {
        alert("Ошибка: Открой через Telegram!");
      }
    }

    // Сообщаем Telegram, что приложение готово
    tg.ready();
    tg.expand(); // Разворачиваем на весь экран
  </script>
</body>
</html>
