<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Рисовалка для Крокодила</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { text-align: center; font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
    canvas { border: 2px solid #333; background: #fff; cursor: crosshair; touch-action: none; border-radius: 10px; width: 100%; max-width: 300px; height: 400px; display: block; margin: 0 auto; }
    .controls { margin-top: 15px; }
    button { padding: 12px 24px; font-size: 16px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
    .btn-clear { background-color: #f44336; }
    .btn-send { background-color: #4CAF50; }
  </style>
</head>
<body>

  <h2>🎨 Рисуй слово</h2>
  <canvas id="canvas" width="300" height="400"></canvas>

  <div class="controls">
    <button class="btn-clear" onclick="clearCanvas()">Очистить</button>
    <button class="btn-send" onclick="sendDrawing()">Отправить</button>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let drawing = false;

    ctx.strokeStyle = "black";
    ctx.lineWidth = 5;
    ctx.lineCap = "round";

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return [
        (clientX - rect.left) * (canvas.width / rect.width),
        (clientY - rect.top) * (canvas.height / rect.height)
      ];
    }

    function startDrawing(e) { drawing = true; const [x, y] = getPos(e); ctx.beginPath(); ctx.moveTo(x, y); e.preventDefault(); }
    function doDrawing(e) { if (!drawing) return; const [x, y] = getPos(e); ctx.lineTo(x, y); ctx.stroke(); e.preventDefault(); }
    function stopDrawing() { drawing = false; }

    canvas.addEventListener("mousedown", startDrawing);
    canvas.addEventListener("mousemove", doDrawing);
    window.addEventListener("mouseup", stopDrawing);
    canvas.addEventListener("touchstart", startDrawing, {passive: false});
    canvas.addEventListener("touchmove", doDrawing, {passive: false});
    canvas.addEventListener("touchend", stopDrawing);

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function sendDrawing() {
      try {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = canvas.width;
        tempCanvas.height = canvas.height;
        const tempCtx = tempCanvas.getContext('2d');

        // Белый фон
        tempCtx.fillStyle = "white";
        tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
        tempCtx.drawImage(canvas, 0, 0);

        // Сжатие (чтобы влезло в лимит 4КБ)
        const dataURL = tempCanvas.toDataURL("image/jpeg", 0.1); 

        if (tg.sendData) {
          tg.sendData(dataURL);
          tg.close();
        } else {
          alert("Ошибка: SDK Телеграма не найден!");
        }
      } catch (err) {
        alert("Ошибка при отправке: " + err.message);
      }
    }
  </script>
</body>
</html>
