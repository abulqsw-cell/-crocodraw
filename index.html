<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Croco</title>
  <style>
    body { text-align: center; font-family: sans-serif; background: #eee; margin: 0; padding: 10px; }
    /* Маленький холст = мало данных */
    canvas { border: 2px solid #000; background: #fff; cursor: crosshair; touch-action: none; width: 200px; height: 200px; }
    .btns { margin-top: 10px; }
    button { padding: 10px; border: none; border-radius: 5px; color: white; font-weight: bold; margin: 5px; }
    .clr { background: #ff4d4d; }
    .snd { background: #2ecc71; }
  </style>
</head>
<body>
  <canvas id="c" width="200" height="200"></canvas>
  <div class="btns">
    <button class="clr" onclick="ctx.clearRect(0,0,200,200)">Очистить</button>
    <button class="snd" onclick="send()">ОТПРАВИТЬ</button>
  </div>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    let draw = false;
    ctx.lineWidth = 3; ctx.lineCap = "round";

    const get = (e) => {
      const r = canvas.getBoundingClientRect();
      const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
      const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
      return [x, y];
    };

    canvas.onmousedown = canvas.ontouchstart = (e) => { draw = true; ctx.beginPath(); ctx.moveTo(...get(e)); };
    canvas.onmousemove = canvas.ontouchmove = (e) => { if(draw) { ctx.lineTo(...get(e)); ctx.stroke(); } };
    window.onmouseup = window.ontouchend = () => draw = false;

    function send() {
      const tmp = document.createElement('canvas');
      tmp.width = 200; tmp.height = 200;
      const tCtx = tmp.getContext('2d');
      tCtx.fillStyle = "white";
      tCtx.fillRect(0,0,200,200);
      tCtx.drawImage(canvas, 0, 0);
      
      // Качество 0.01 — это супер-сжатие. Картинка будет весить копейки.
      const data = tmp.toDataURL("image/jpeg", 0.01);
      
      if (data.length > 4000) {
        alert("Слишком много линий! Сотри часть.");
      } else {
        tg.sendData(data);
        tg.close();
      }
    }
    tg.expand();
  </script>
</body>
</html>
