<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Croco Draw</title>
  <style>
    body { text-align: center; font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
    canvas { border: 2px solid #333; background: #fff; border-radius: 10px; touch-action: none; width: 100%; max-width: 300px; }
    .btns { margin-top: 10px; }
    button { padding: 10px 20px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; margin: 5px; }
    .clear { background: #e74c3c; }
    .send { background: #2ecc71; }
  </style>
</head>
<body>
  <h3>🎨 Рисуй слово</h3>
  <canvas id="canvas" width="300" height="400"></canvas>
  <div class="btns">
    <button class="clear" onclick="clearCanvas()">Очистить</button>
    <button class="send" onclick="sendDrawing()">Отправить</button>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let drawing = false;

    ctx.lineWidth = 5;
    ctx.lineCap = "round";
    ctx.strokeStyle = "black";

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
      return [x * (canvas.width / rect.width), y * (canvas.height / rect.height)];
    }

    canvas.onmousedown = canvas.ontouchstart = (e) => {
      drawing = true;
      const [x, y] = getPos(e);
      ctx.beginPath();
      ctx.moveTo(x, y);
      if (e.type === 'touchstart') e.preventDefault();
    };

    canvas.onmousemove = canvas.ontouchmove = (e) => {
      if (!drawing) return;
      const [x, y] = getPos(e);
      ctx.lineTo(x, y);
      ctx.stroke();
      if (e.type === 'touchmove') e.preventDefault();
    };

    window.onmouseup = window.ontouchend = () => drawing = false;

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function sendDrawing() {
      // Создаем временный холст для белого фона
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      const tempCtx = tempCanvas.getContext('2d');

      // Белая подложка
      tempCtx.fillStyle = "white";
      tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
      tempCtx.drawImage(canvas, 0, 0);

      // КРИТИЧНО: Формат JPEG и качество 0.05 (минимальный вес)
      const data = tempCanvas.toDataURL("image/jpeg", 0.05);

      try {
        tg.sendData(data);
        tg.close();
      } catch (err) {
        alert("Ошибка: Рисунок слишком сложный! Очисти и нарисуй проще.");
      }
    }
  </script>
</body>
</html>
